name: Docker CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.cpp'
      - 'makefile'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # ВНИМАНИЕ: имя ДОЛЖНО быть в НИЖНЕМ РЕГИСТРЕ для GHCR!
  IMAGE_NAME: avtomonovak/lab3_docker
  DOCKER_BUILDKIT: 1

jobs:
  # ============================================
  # СТАДИЯ 1: BUILD - Сборка программы
  # ============================================
  build:
    name: 🔨 Build
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ make
    
    - name: Verify compiler
      run: |
        g++ --version
        make --version
    
    - name: Clean previous builds
      run: make clean
    
    - name: Build application
      run: |
        make all
        echo "✅ Build completed successfully"
    
    - name: Verify binary
      run: |
        ls -la fibonacci test_fibonacci
        file fibonacci
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: fibonacci-binary
        path: |
          fibonacci
          test_fibonacci
        if-no-files-found: error
        retention-days: 7

  # ============================================
  # СТАДИЯ 2: TEST - Запуск тестов
  # ============================================
  test:
    name: 🧪 Test
    runs-on: self-hosted
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ make
    
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: fibonacci-binary
        path: ./
    
    - name: Make binaries executable
      run: |
        chmod +x fibonacci
        chmod +x test_fibonacci
    
    - name: Run unit tests
      run: |
        make test
      continue-on-error: false
    
    - name: Run argument-based tests
      run: |
        echo "=== Testing with command line arguments ==="
        
        echo -n "Test n=0: "
        ./fibonacci 0 | grep -q "0" && echo "✅ PASS" || echo "❌ FAIL"
        
        echo -n "Test n=1: "
        ./fibonacci 1 | grep -q "1" && echo "✅ PASS" || echo "❌ FAIL"
        
        echo -n "Test n=10: "
        ./fibonacci 10 | grep -q "55" && echo "✅ PASS" || echo "❌ FAIL"
        
        echo -n "Test n=20: "
        ./fibonacci 20 | grep -q "6765" && echo "✅ PASS" || echo "❌ FAIL"
        
        echo -n "Test n=50: "
        ./fibonacci 50 | grep -q "12586269025" && echo "✅ PASS" || echo "❌ FAIL"
        
        echo ""
        echo "=== Testing invalid inputs ==="
        
        echo -n "Test invalid 'abc': "
        ./fibonacci abc 2>&1 | grep -q "Ошибка" && echo "✅ PASS" || echo "❌ FAIL"
        
        echo -n "Test invalid '-5': "
        ./fibonacci -5 2>&1 | grep -q "Ошибка" && echo "✅ PASS" || echo "❌ FAIL"

  # ============================================
  # СТАДИЯ 3: PACKAGE - Сборка Docker образа
  # ============================================
  package:
    name: 📦 Package
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest
          type=raw,value=${{ github.sha }}
          type=sha,format=short
        labels: |
          org.opencontainers.image.title=Fibonacci Calculator
          org.opencontainers.image.description=Fibonacci calculator for Lab3
          org.opencontainers.image.version=1.0.0
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true
    
    - name: List Docker images for debugging
      run: |
        echo "=== All Docker images ==="
        docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
    
    - name: Test Docker image
      run: |
        echo "=== Testing Docker image ==="
        
        # Формируем правильное имя образа (В НИЖНЕМ РЕГИСТРЕ!)
        FULL_IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        COMMIT_SHA="${{ github.sha }}"
        
        echo "Looking for image: $FULL_IMAGE_NAME:$COMMIT_SHA"
        echo "Also looking for: $FULL_IMAGE_NAME:latest"
        
        # Находим существующий тег образа
        FOUND_TAG=""
        if docker images --format "{{.Repository}}:{{.Tag}}" | grep -q "^$FULL_IMAGE_NAME:$COMMIT_SHA$"; then
          FOUND_TAG="$FULL_IMAGE_NAME:$COMMIT_SHA"
          echo "✅ Found image with commit tag"
        elif docker images --format "{{.Repository}}:{{.Tag}}" | grep -q "^$FULL_IMAGE_NAME:latest$"; then
          FOUND_TAG="$FULL_IMAGE_NAME:latest"
          echo "✅ Found image with latest tag"
        else
          echo "❌ Image not found!"
          echo "Available images with 'lab3_docker':"
          docker images | grep "lab3_docker" || echo "  (none found)"
          exit 1
        fi
        
        echo ""
        echo "Test 1: Run with valid input (n=10)"
        RESULT=$(docker run --rm $FOUND_TAG 10)
        if [ "$RESULT" == "55" ]; then
          echo "✅ PASS (got: $RESULT)"
        else
          echo "❌ FAIL (expected: 55, got: $RESULT)"
          exit 1
        fi
        
        echo ""
        echo "Test 2: Run with valid input (n=20)"
        RESULT=$(docker run --rm $FOUND_TAG 20)
        if [ "$RESULT" == "6765" ]; then
          echo "✅ PASS (got: $RESULT)"
        else
          echo "❌ FAIL (expected: 6765, got: $RESULT)"
          exit 1
        fi
        
        echo ""
        echo "Test 3: Run with invalid input (abc)"
        if docker run --rm $FOUND_TAG abc 2>&1 | grep -q "Ошибка"; then
          echo "✅ PASS"
        else
          echo "❌ FAIL"
          exit 1
        fi
        
        echo ""
        echo "Test 4: Check image size"
        docker images $FOUND_TAG --format "Size: {{.Size}}"
        
        echo ""
        echo "✅ All Docker image tests passed"
    
    - name: Save Docker image as artifact
      run: |
        FULL_IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        COMMIT_SHA="${{ github.sha }}"
        
        # Определяем какой тег использовать для сохранения
        if docker images --format "{{.Repository}}:{{.Tag}}" | grep -q "^$FULL_IMAGE_NAME:$COMMIT_SHA$"; then
          docker save $FULL_IMAGE_NAME:$COMMIT_SHA -o fibonacci-image.tar
        else
          docker save $FULL_IMAGE_NAME:latest -o fibonacci-image.tar
        fi
        
        gzip -9 fibonacci-image.tar
        echo "✅ Docker image saved as fibonacci-image.tar.gz"
        ls -lh fibonacci-image.tar.gz
    
    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: fibonacci-docker-image
        path: fibonacci-image.tar.gz
        if-no-files-found: error
        retention-days: 7

  # ============================================
  # СТАДИЯ 4: DEPLOY - Публикация в GHCR
  # ============================================
  deploy:
    name: 🚀 Deploy to GHCR
    runs-on: self-hosted
    needs: package
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest
          type=raw,value=${{ github.sha }}
          type=sha,format=short
    
    - name: Build and push Docker image to GHCR
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Verify deployed image
      run: |
        echo "=== Verifying deployed image ==="
        
        FULL_IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        
        echo "Pulling: $FULL_IMAGE_NAME:latest"
        docker pull $FULL_IMAGE_NAME:latest
        
        echo -n "Test n=15: "
        RESULT=$(docker run --rm $FULL_IMAGE_NAME:latest 15)
        if [ "$RESULT" == "610" ]; then
          echo "✅ PASS (got: $RESULT)"
        else
          echo "❌ FAIL (expected: 610, got: $RESULT)"
          exit 1
        fi
        
        echo -n "Test n=30: "
        RESULT=$(docker run --rm $FULL_IMAGE_NAME:latest 30)
        if [ "$RESULT" == "832040" ]; then
          echo "✅ PASS (got: $RESULT)"
        else
          echo "❌ FAIL (expected: 832040, got: $RESULT)"
          exit 1
        fi
        
        echo ""
        echo "✅ Deployed image works correctly"
    
    - name: Create deployment summary
      run: |
        FULL_IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        cat >> $GITHUB_STEP_SUMMARY << EOF
        ## 🚀 Deployment Successful!
        
        | Метка | Значение |
        |-------|----------|
        | **Image** | \`$FULL_IMAGE_NAME\` |
        | **Tag latest** | \`$FULL_IMAGE_NAME:latest\` |
        | **Tag commit** | \`$FULL_IMAGE_NAME:${{ github.sha }}\` |
        
        ### Как использовать образ:
        \`\`\`bash
        docker pull $FULL_IMAGE_NAME:latest
        docker run --rm $FULL_IMAGE_NAME:latest 10
        \`\`\`
        EOF
